        function selectWWord(word, id) { if (wAnswered) return; wBuilderWords.push({word: word, id: id}); document.getElementById(`w-bank-${id}`).classList.add('hidden'); updateWBuilder(); }
        function unselectWWord(id) { if (wAnswered) return; const index = wBuilderWords.findIndex(item => item.id === id); if (index > -1) { wBuilderWords.splice(index, 1); document.getElementById(`w-bank-${id}`).classList.remove('hidden'); updateWBuilder(); } }
        function updateWBuilder() { let box = document.getElementById("wSBox"); box.innerHTML = wBuilderWords.map(item => `<div class="word-tile" onclick="unselectWWord(${item.id})">${item.word}</div>`).join(''); if(wBuilderWords.length > 0) box.classList.add("filled"); else box.classList.remove("filled"); if(wBuilderWords.length === wQuiz.questions[wQIdx].words.length) enableWBtn(); else disableWBtn(); }
        function checkWInput() { if(!wAnswered && document.getElementById("wTypeIn").value.trim().length > 0) enableWBtn(); else disableWBtn(); }
        function handleWEnter(e) { if (e.key === "Enter" && !document.getElementById("wBtnMain").disabled) { e.preventDefault(); handleWQuizAction(); } }
        function enableWBtn() { let b = document.getElementById("wBtnMain"); b.disabled=false; b.className="main-btn btn-primary cursor-pointer"; }
        function disableWBtn() { let b = document.getElementById("wBtnMain"); b.disabled=true; b.className="main-btn btn-disabled"; }

        function handleWQuizAction() {
            if (wAnswered) { wQIdx++; renderWordQuiz(); return; }
            const q = wQuiz.questions[wQIdx]; let isCorrect = false; let correctAnswerText = ""; wAnswered = true;

            if (q.type === "multiple" || q.type === "audio") {
                isCorrect = (wOptSel === q.answer);
                correctAnswerText = q.options[q.answer]; 
                document.querySelectorAll('[id^="w-opt-"]').forEach((el, idx) => { el.classList.remove('selected'); if (idx === q.answer) el.classList.add('correct'); else if (idx === wOptSel && !isCorrect) el.classList.add('wrong'); });
            } else if (q.type === "builder") {
                isCorrect = (wBuilderWords.map(i => i.word).join(" ") === q.correct_order.join(" ")); 
                correctAnswerText = q.correct_order.join(" ");
                if(!isCorrect) document.getElementById("wQuizBody").classList.add("shake");
            } else if (q.type === "typing") {
                let inp = document.getElementById("wTypeIn"); inp.disabled = true;
                isCorrect = (inp.value.trim().toLowerCase() === q.answer.toLowerCase()); 
                correctAnswerText = q.answer;
                inp.classList.add(isCorrect ? "correct" : "wrong");
                if(!isCorrect) document.getElementById("wQuizBody").classList.add("shake");
            }

            let btn = document.getElementById("wBtnMain"), foot = document.getElementById("wQuizFoot");
            if (isCorrect) {
                if(db.addXP(1, CARDS[currentCardIndex].en + "_q" + wQIdx)) wScore++;
                foot.style.background = "rgba(16, 185, 129, 0.1)"; btn.className = "main-btn btn-success"; btn.innerHTML = "HARİKA! DEVAM ET ❯";
            } else {
                foot.style.background = "rgba(239, 68, 68, 0.1)"; btn.className = "main-btn bg-red-500 text-white"; btn.innerHTML = "ANLADIM ❯";
                
                let errorHtml = '';
                if (correctAnswerText) {
                    errorHtml += `<div class="${q.explanation ? 'mb-3' : ''}"><span class="text-xs uppercase text-red-400/80 block mb-1 tracking-wider font-black">Doğru Cevap:</span><span class="text-white text-xl">${correctAnswerText}</span></div>`;
                }
                if (q.explanation) {
                    errorHtml += `<div class="border-t border-red-500/20 pt-3 mt-3"><span class="text-xs uppercase text-amber-400/80 block mb-1 tracking-wider font-black flex items-center gap-1"><span>💡</span> Hoca Notu:</span><span class="text-red-200 text-[15px] leading-snug font-medium">${q.explanation}</span></div>`;
                }

                if (errorHtml) { 
                    const msg = document.createElement("div"); 
                    msg.className = "text-red-400 font-bold mb-4 text-lg bg-red-500/10 p-5 rounded-2xl border border-red-500/20"; 
                    msg.innerHTML = errorHtml; 
                    foot.insertBefore(msg, btn); 
                }
            }
        }

        const HLS_URL = "https://storage.diziyou.one/episodes/104101/720p.m3u8"; const SRT_URL = "https://raw.githubusercontent.com/theven900-blip/ingilizce-altyazi/refs/heads/main/Love.101.S01E01.NF.WEBRip.srt"; const PRE = 2, POST = 2; let hls=null, cues=[], matched=[], sceneIndex=0, video=document.getElementById("video"), isSeeking=false;

        async function openVideo(e,i){ e.stopPropagation(); openModalAnim('videoModal'); document.getElementById("subtitle").innerHTML = "<span class='animate-pulse'>Yükleniyor...</span>"; let w=CARDS[i].en.trim(); if(!cues.length) try { cues = await loadSRT(); } catch(err) { document.getElementById("subtitle").innerHTML = "Hata!"; return; } matched=findScenes(cues, w); sceneIndex=0; if(hls) hls.destroy(); if(video.canPlayType("application/vnd.apple.mpegurl")) video.src=HLS_URL; else if(Hls.isSupported()){ hls=new Hls(); hls.loadSource(HLS_URL); hls.attachMedia(video); } if(matched.length){ document.getElementById("status").innerText = matched.length + " sahne"; jumpToScene(0); } else { document.getElementById("subtitle").innerHTML="<span class='text-zinc-500'>Bu kelime videoda yok.</span>"; document.getElementById("status").innerText="Bulunamadı"; } }

        function jumpToScene(i){ if(!matched[i]) return; sceneIndex=i; let c=matched[i]; document.getElementById("subtitle").innerHTML = c.text; isSeeking=true; video.currentTime = Math.max(0, c.start - PRE); video.play(); setTimeout(()=>isSeeking=false, 1000); }

        function changeScene(d){ let n=sceneIndex+d; if(n>=0 && n<matched.length) jumpToScene(n); }

        video.addEventListener("timeupdate", ()=>{ if(!matched.length || isSeeking) return; let c = matched[sceneIndex]; if(!c) return; if(video.currentTime >= c.start && video.currentTime <= c.end + POST) document.getElementById("subtitle").innerHTML = c.text; if(video.currentTime >= c.end + POST) video.pause(); });

        function closeVideo(){ closeModal('videoModal'); video.pause(); }

        async function loadSRT(){ let t = await (await fetch(SRT_URL)).text(); return parseSRT(t); }

        function parseSRT(t){ return t.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n\n").map(b=>{ let l=b.trim().split("\n"); if(l.length < 3) return null; let m = l[1].match(/(\d{2}:\d{2}:\d{2})/g); if(!m) return null; return { start: srtToSec(m[0]), end: srtToSec(m[1]), text: l.slice(2).join(" ").replace(/<\/?[^>]+(>|$)/g, "") }; }).filter(Boolean); }

        function srtToSec(t){ let parts = t.split(":"); return (+parts[0])*3600 + (+parts[1])*60 + (+parts[2]); }

        function findScenes(l,w){ let r=new RegExp(`(^|[^a-z])(${w})(?=$|[^a-z])`,"i"); return l.filter(c=>r.test(c.text)); }

        // ==========================================
        // WINDOW ONLOAD GÜNCELLEMESİ
        // ==========================================
        window.onload = () => { 
            db.init(); 
            renderRoadmap(); 
            loadWordsData(); // Veriyi çekip ardından renderCards'ı tetikler
        };
    </script>
