<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Survival English - Busuu Style Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #0b0b0f;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.12), transparent 35%),
                radial-gradient(circle at 90% 70%, rgba(16, 185, 129, 0.08), transparent 35%),
                radial-gradient(circle at 40% 80%, rgba(139, 92, 246, 0.06), transparent 40%);
            color: #f0f0f4; 
            font-family: 'Outfit', sans-serif; 
            margin: 0; padding: 0; 
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            letter-spacing: 0.3px;
        }

        /* ÜST BAR VE ORTAK CSS - DAHA MODERN */
        .top-bar { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 20px 24px; z-index: 10; 
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        .stats-container { display: flex; gap: 12px; }
        .stat-pill { 
            background: rgba(20, 20, 30, 0.7); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            padding: 8px 18px; border-radius: 40px; 
            font-size: 14px; font-weight: 800; 
            display: flex; align-items: center; gap: 8px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .stat-pill.xp { 
            color: #fcd34d; 
            border-color: rgba(252, 211, 77, 0.2); 
            background: rgba(252, 211, 77, 0.05);
            box-shadow: 0 0 25px rgba(252, 211, 77, 0.2);
        }
        .stat-pill span:first-child { font-size: 16px; filter: drop-shadow(0 0 8px gold); }

        .view-section { 
            flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; 
            display: none; animation: fadeIn 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
            height: 100%; 
        }
        .view-section.active { display: block; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes slideInUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px currentColor; } 50% { box-shadow: 0 0 35px currentColor; } }

        /* --- 1. AKADEMİ YOL HARİTASI - DAHA MODERN --- */
        .roadmap-container { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .level-header { width: 100%; text-align: left; margin-bottom: 30px; padding-left: 8px; }
        .level-header h1 { 
            font-size: 2.5rem; font-weight: 900; 
            background: linear-gradient(135deg, #fff, #9ca3af); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px; letter-spacing: -1px;
        }
        .level-header p { color: #a0a0b0; font-weight: 500; font-size: 1rem; }

        .node-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            position: relative; width: 100%; margin-bottom: 25px; 
        }
        .node-line { 
            position: absolute; top: 85px; bottom: -40px; width: 4px; 
            background: linear-gradient(to bottom, #2a2a35, #3a3a45 50%, #2a2a35);
            z-index: 0; border-radius: 4px; box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .node-wrapper:last-child .node-line { display: none; }
        .node-btn { 
            width: 88px; height: 88px; border-radius: 50%; 
            background: #181820; border: 3px solid #2a2a35; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 36px; z-index: 1; 
            box-shadow: 0 15px 30px -8px rgba(0, 0, 0, 0.7); 
            cursor: pointer; transition: all 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
        }
        .node-btn:active { transform: scale(0.94); }
        .node-btn.unlocked { 
            background: #2563eb; border-color: #60a5fa; 
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.5), inset 0 -4px 0 rgba(0,0,0,0.2);
        }
        .node-btn.completed { 
            background: #059669; border-color: #34d399; 
            box-shadow: 0 10px 30px rgba(5, 150, 105, 0.5), inset 0 -4px 0 rgba(0,0,0,0.2);
        }
        .node-btn.story { 
            background: #7c3aed; border-color: #a78bfa; 
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.5), inset 0 -4px 0 rgba(0,0,0,0.2);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            width: 96px;
        }
        .node-btn.story.completed { background: #059669; border-color: #34d399; }

        .node-info { 
            background: rgba(20, 20, 28, 0.8); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03); 
            padding: 14px 24px; border-radius: 60px; 
            margin-top: 20px; z-index: 1; text-align: center; 
            max-width: 90%; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        .node-info h3 { font-weight: 800; font-size: 18px; color: white; margin-bottom: 4px; }
        .node-info p { font-size: 13px; color: #a0a0b0; font-weight: 500; line-height: 1.4; }

        /* --- 2. AKADEMİ DERS İÇİ STİLLER - MODERNİZE --- */
        .grammar-modal { 
            position: fixed; inset: 0; background: rgba(5, 5, 10, 0.98); 
            z-index: 2000; display: flex; flex-direction: column; 
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.94, 0.6, 1); 
            backdrop-filter: blur(15px);
        }
        .grammar-modal.show { transform: translateY(0); }
        .grammar-header { 
            display: flex; align-items: center; gap: 15px; padding: 20px 24px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.03); 
            background: rgba(8, 8, 14, 0.8); z-index: 10; 
        }
        .grammar-progress-bg { 
            flex-grow: 1; height: 10px; background: #20202a; 
            border-radius: 20px; overflow: hidden; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .grammar-progress-fill { 
            height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6, #10b981); 
            width: 0%; transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
            border-radius: 20px; box-shadow: 0 0 15px #3b82f6;
        }
        .grammar-body { flex-grow: 1; overflow-y: auto; padding: 32px 24px; display: flex; flex-direction: column; max-width: 600px; margin: 0 auto; width: 100%; }
        .grammar-footer { 
            padding: 24px; border-top: 1px solid rgba(255, 255, 255, 0.03); 
            background: rgba(8, 8, 14, 0.8); display: flex; justify-content: center; z-index: 10; 
        }

        /* Teori kartları daha modern */
        .g-theory-container { animation: fadeIn 0.5s ease; display: flex; flex-direction: column; gap: 28px; }
        .g-theory-icon { font-size: 80px; text-align: center; display: block; filter: drop-shadow(0 10px 20px rgba(59,130,246,0.3)); margin-bottom: -15px; }
        .g-theory-title { font-size: 2.6rem; font-weight: 900; background: linear-gradient(to bottom right, #fff, #b0b0c0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; line-height: 1.1; letter-spacing: -1px; }
        .g-theory-text { font-size: 18px; color: #d0d0e0; line-height: 1.7; font-weight: 400; text-align: center; }

        .g-formula { 
            background: rgba(15, 15, 22, 0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; 
            padding: 28px 20px; display: flex; flex-direction: column; gap: 16px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .g-formula-row { display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 20px; font-weight: 800; }
        .g-pill { padding: 12px 24px; border-radius: 60px; font-weight: 800; }
        .g-pill.subj { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
        .g-pill.verb { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

        .g-example-card { 
            background: rgba(20, 20, 28, 0.7); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 24px; 
            padding: 18px 24px; display: flex; align-items: center; gap: 20px; 
            cursor: pointer; transition: all 0.2s; 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        .g-example-card:active { transform: translateY(4px) scale(0.99); background: #20202a; }
        .g-play-btn { 
            width: 48px; height: 48px; border-radius: 50%; 
            background: rgba(59,130,246,0.15); color: #60a5fa; 
            display: flex; justify-content: center; align-items: center; font-size: 22px; 
            flex-shrink: 0; border: 1px solid rgba(59,130,246,0.3);
        }
        .g-ex-en { font-size: 20px; font-weight: 800; color: white; margin-bottom: 5px; }
        .g-ex-tr { font-size: 15px; color: #a0a0b0; font-weight: 500; }
        .g-highlight { color: #34d399; font-weight: 800; }

        .g-alert-box { 
            background: rgba(245, 158, 11, 0.05); 
            border: 1px solid rgba(245, 158, 11, 0.15); 
            border-left: 5px solid #f59e0b; 
            padding: 20px; border-radius: 20px; 
        }
        .g-alert-box strong { color: #fcd34d; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        /* Ana butonlar */
        .main-btn { 
            width: 100%; max-width: 500px; padding: 20px; border-radius: 60px; 
            font-weight: 900; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; 
            transition: all 0.2s; border: none; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 10px; 
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }
        .btn-primary { 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            color: white; box-shadow: 0 10px 25px -5px #3b82f6;
        }
        .btn-primary:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 2px; }
        .btn-disabled { background: #20202a; color: #5f5f70; border-bottom-color: #0a0a10; cursor: not-allowed; }
        .btn-success { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; box-shadow: 0 10px 25px -5px #10b981;
        }
        .btn-success:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 2px; }

        /* Quiz optionları */
        .quiz-opt { 
            width: 100%; padding: 22px 24px; 
            background: rgba(20, 20, 28, 0.7); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 40px; 
            font-size: 18px; font-weight: 700; color: #e0e0f0; 
            display: flex; align-items: center; justify-content: space-between; 
            cursor: pointer; transition: all 0.2s; 
            border-bottom: 4px solid rgba(0, 0, 0, 0.2);
            margin-bottom: 16px; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        .quiz-opt:active { transform: translateY(3px); border-bottom-width: 2px; }
        .quiz-opt.selected { 
            background: rgba(37, 99, 235, 0.15); border-color: #3b82f6; 
            border-bottom-color: #2563eb; color: #93c5fd; 
            box-shadow: 0 0 30px rgba(59,130,246,0.3);
        }
        .quiz-opt.selected .opt-radio { border-color: #3b82f6; background: #3b82f6; box-shadow: inset 0 0 0 4px #181820; }
        .quiz-opt.correct { 
            background: rgba(16, 185, 129, 0.15) !important; border-color: #10b981 !important; 
            border-bottom-color: #059669 !important; color: #6ee7b7 !important; 
        }
        .quiz-opt.correct .opt-radio { border-color: #10b981; background: #10b981; }
        .quiz-opt.wrong { 
            background: rgba(239, 68, 68, 0.15) !important; border-color: #ef4444 !important; 
            border-bottom-color: #dc2626 !important; color: #fca5a5 !important; 
        }
        .quiz-opt.wrong .opt-radio { border-color: #ef4444; background: #ef4444; }
        .opt-radio { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #5f5f70; transition: all 0.2s; }

        /* Kelime tile'ları */
        .word-bank { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; justify-content: center; }
        .word-tile { 
            background: #20202a; border: 1px solid #3a3a45; border-bottom: 4px solid #3a3a45; 
            padding: 16px 28px; border-radius: 60px; font-weight: 800; font-size: 20px; 
            cursor: pointer; transition: all 0.15s; color: #f0f0f4; user-select: none; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }
        .word-tile:active { transform: translateY(3px); border-bottom-width: 2px; }
        .word-tile.hidden { opacity: 0; pointer-events: none; transform: scale(0.8); position: absolute; z-index: -1;}

        .sentence-box { 
            display: flex; flex-wrap: wrap; gap: 12px; min-height: 110px; 
            padding: 24px; background: #101018; border: 2px dashed #3a3a45; 
            border-radius: 40px; align-items: flex-start; transition: all 0.3s; 
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }
        .sentence-box.filled { border-style: solid; border-color: #2563eb; background: #0a0a15; }
        .sentence-box .word-tile { background: #2563eb; border-color: #1e40af; border-bottom-color: #1e3a8a; color: white; margin: 0; }

        .type-input { 
            width: 100%; background: #101018; border: 2px solid #3a3a45; 
            border-radius: 50px; padding: 24px; font-size: 32px; font-weight: 900; 
            text-align: center; color: white; outline: none; transition: all 0.3s; 
        }
        .type-input:focus { border-color: #3b82f6; box-shadow: 0 0 30px #3b82f6; }
        .type-input.correct { border-color: #10b981; color: #6ee7b7; }
        .type-input.wrong { border-color: #ef4444; color: #fca5a5; }

        /* Swipe kartları */
        .swipe-card-out-right { transform: translateX(150%) rotate(25deg) !important; opacity: 0 !important; pointer-events: none; transition: all 0.4s !important; }
        .swipe-card-out-left { transform: translateX(-150%) rotate(-25deg) !important; opacity: 0 !important; pointer-events: none; transition: all 0.4s !important; }

        .match-slot { transition: all 0.3s ease; }
        .match-item.selected { 
            background: #3b82f6 !important; border-color: #1e40af !important; 
            transform: scale(1.05); box-shadow: 0 10px 30px #3b82f6; 
        }

        /* Hikaye Modu */
        .story-container { display: flex; flex-direction: column; height: 100%; gap: 20px; animation: fadeIn 0.5s ease; }
        .story-scene-img { 
            width: 100%; height: 220px; 
            background: linear-gradient(145deg, #151520, #0a0a12); 
            border-radius: 40px; border: 1px solid #2a2a35; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 80px; margin-bottom: 10px; 
            box-shadow: inset 0 0 80px rgba(0,0,0,0.7), 0 20px 30px -10px black;
        }
        .story-text { 
            font-size: 18px; color: #f0f0f4; line-height: 1.7; font-weight: 500; 
            background: rgba(15, 15, 22, 0.8); backdrop-filter: blur(5px);
            padding: 24px; border-radius: 32px; border-left: 5px solid #8b5cf6; 
            border: 1px solid rgba(255,255,255,0.03);
        }
        .story-options { display: flex; flex-direction: column; gap: 16px; margin-top: auto; }
        .story-opt-btn { 
            background: rgba(20, 20, 28, 0.7); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 40px; 
            padding: 18px 24px; color: white; font-weight: 700; font-size: 17px; 
            text-align: left; cursor: pointer; transition: all 0.2s; 
            border-bottom: 4px solid rgba(0, 0, 0, 0.2); box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .story-opt-btn:active { transform: translateY(4px); border-bottom-width: 2px; }
        .story-opt-btn:hover { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.15); }

        /* --- 3. KELİMELER KART YAPISI - ÇOK MODERN --- */
        .container-words { width: 100%; max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .card-box { 
            width: 100%; height: 72vh; max-height: 750px; min-height: 560px; 
            perspective: 1500px; margin-bottom: 25px; cursor: pointer; 
        }
        .card-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1); 
            transform-style: preserve-3d; 
        }
        .card-box.is-flipped .card-inner { transform: rotateY(180deg); }

        .face { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 48px; display: flex; flex-direction: column; overflow: hidden; 
            transform: translateZ(0); box-shadow: 0 30px 60px -15px black;
        }
        .face::before {
            content: ''; position: absolute; inset: 0; border-radius: 48px; 
            padding: 2px; background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.01)); 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }

        .front { 
            background: radial-gradient(circle at 30% 30%, #1a1a28, #0a0a12); 
            padding: 32px; align-items: center; justify-content: center; 
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255,255,255,0.02); 
            z-index: 2; transform: rotateY(0deg); 
        }
        .front-glow { 
            position: absolute; width: 250px; height: 250px; 
            background: #3b82f6; filter: blur(130px); opacity: 0.2; 
            border-radius: 50%; top: -50px; right: -50px; 
        }
        .back { 
            background: radial-gradient(circle at 70% 80%, #12121c, #05050a); 
            transform: rotateY(180deg); justify-content: space-between; 
            padding: 28px; box-shadow: 0 30px 60px -15px black; z-index: 1; 
        }

        .word-title { 
            font-size: 5.5rem; font-weight: 900; 
            background: linear-gradient(145deg, #ffffff, #c0c0d0); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-transform: uppercase; letter-spacing: -3px; line-height: 1; 
            margin-bottom: 20px; z-index: 10; text-align: center; 
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }
        .phonetic-badge { 
            background: rgba(56, 189, 248, 0.1); 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            color: #7dd3fc; padding: 10px 24px; border-radius: 60px; 
            font-weight: 800; letter-spacing: 4px; font-size: 16px; 
            z-index: 10; box-shadow: 0 4px 25px rgba(56, 189, 248, 0.2); 
            backdrop-filter: blur(4px);
        }
        .tap-hint { 
            position: absolute; bottom: 40px; font-size: 12px; font-weight: 800; 
            color: #6b6b80; letter-spacing: 6px; text-transform: uppercase; 
            display: flex; flex-direction: column; align-items: center; gap: 8px; 
        }
        .tap-hint span { animation: bounce 2s infinite; font-size: 18px; filter: drop-shadow(0 0 5px #3b82f6); }

        /* Buton grid arka yüz */
        .back .grid > div { 
            background: rgba(15, 15, 25, 0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 30px; 
            transition: all 0.2s; box-shadow: 0 10px 20px -5px black;
        }
        .back .grid > div:active { transform: scale(0.95); background: #202030; }

        /* Modal genel */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0, 0, 0, 0.85); z-index: 2000; 
            justify-content: center; align-items: center; padding: 16px; 
            flex-direction: column; backdrop-filter: blur(20px); 
            opacity: 0; transition: opacity 0.3s ease; 
        }
        .modal.show { opacity: 1; }
        .close-btn-global { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(30, 30, 40, 0.7); backdrop-filter: blur(10px);
            color: #b0b0c0; width: 48px; height: 48px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; z-index: 2001; border: 1px solid rgba(255,255,255,0.05); 
            font-size: 20px; transition: all 0.2s; 
        }
        .close-btn-global:active { transform: scale(0.9); background: #3a3a50; color: white; }

        .content-container { 
            width: 100%; max-width: 550px; 
            background: rgba(8, 8, 14, 0.9); backdrop-filter: blur(20px);
            border-radius: 48px; border: 1px solid rgba(255, 255, 255, 0.03); 
            max-height: 85vh; overflow-y: auto; 
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9); position: relative; 
            transform: translateY(30px); transition: transform 0.4s; 
        }
        .modal.show .content-container { transform: translateY(0); }

        .quiz-container { 
            display: flex; flex-direction: column; width: 100%; max-width: 600px; 
            height: 90vh; max-height: 850px; 
            background: radial-gradient(circle at top, #12121c, #03030a); 
            border-radius: 48px; overflow: hidden; position: relative; 
            border: 1px solid rgba(255, 255, 255, 0.02); 
            box-shadow: 0 40px 80px rgba(0, 0, 0, 1); 
            transform: translateY(30px); transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
        }
        .modal.show .quiz-container { transform: translateY(0); }

        .quiz-header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.03); 
            background: rgba(10, 10, 18, 0.8); backdrop-filter: blur(10px); z-index: 10; 
        }
        .quiz-body { flex-grow: 1; padding: 32px 24px; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; }
        .quiz-footer { 
            padding: 24px; border-top: 1px solid rgba(255,255,255,0.03); 
            background: rgba(10, 10, 18, 0.8); backdrop-filter: blur(10px); z-index: 10; 
            transition: background 0.3s; 
        }

        /* Chat modal */
        .chat-container-modern { 
            width: 100%; max-width: 550px; 
            background: rgba(5, 5, 10, 0.95); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; max-height: 85vh; height: 100%; 
            border-radius: 48px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); 
            box-shadow: 0 40px 80px -20px black; position: relative; 
            transform: translateY(30px); transition: transform 0.4s; 
        }
        .modal.show .chat-container-modern { transform: translateY(0); }
        .chat-header { 
            background: rgba(15, 15, 25, 0.8); backdrop-filter: blur(15px); 
            padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.03); 
            display: flex; align-items: center; justify-content: space-between; z-index: 10; 
        }
        .chat-avatar { 
            width: 50px; height: 50px; min-width: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 26px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
        }
        .chat-avatar.a { background: linear-gradient(145deg, #2563eb, #1e40af); }
        .chat-avatar.b { background: linear-gradient(145deg, #059669, #047857); }
        .chat-messages { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; flex-grow: 1; }
        .msg-row { display: flex; gap: 12px; max-width: 90%; animation: slideInUp 0.5s forwards; }
        .msg-row.right { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { 
            padding: 20px 24px; border-radius: 32px; position: relative; 
            cursor: pointer; transition: transform 0.1s; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); width: 100%; 
        }
        .msg-bubble:active { transform: scale(0.98); }
        .msg-row.left .msg-bubble { background: #20202a; border: 1px solid #3a3a45; border-top-left-radius: 8px; }
        .msg-row.right .msg-bubble { 
            background: rgba(16, 185, 129, 0.1); 
            border: 1px solid rgba(16, 185, 129, 0.2); 
            border-top-right-radius: 8px; 
        }
        .msg-en { font-size: 18px; font-weight: 800; color: white; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; line-height: 1.4; }
        .msg-tr { font-size: 15px; color: #b0b0c0; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 12px; margin-top: 12px; font-weight: 500; }
        .msg-ph { font-size: 14px; color: #fcd34d; font-family: monospace; opacity: 0.9; margin-top: 6px; font-weight: bold; }
        .msg-play-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            width: 40px; height: 40px; min-width: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 18px; 
            transition: all 0.2s; 
        }
        .msg-row.right .msg-play-btn { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.3); }

        /* Video modal */
        .video-wrapper { 
            width: 100%; max-width: 650px; display: flex; flex-direction: column; align-items: center; 
            background: rgba(5, 5, 10, 0.95); backdrop-filter: blur(20px);
            border-radius: 48px; padding: 28px; border: 1px solid rgba(255,255,255,0.03); 
            box-shadow: 0 50px 100px rgba(0, 0, 0, 1); position: relative; 
            transform: scale(0.95); transition: transform 0.4s; 
        }
        .modal.show .video-wrapper { transform: scale(1); }
        video { 
            width: 100%; border-radius: 32px; border: 1px solid #2a2a35; 
            background: #000; box-shadow: 0 20px 40px -10px black; 
            aspect-ratio: 16/9; object-fit: cover; 
        }
        .subtitle-box { 
            margin-top: 24px; 
            background: rgba(15, 15, 25, 0.8); backdrop-filter: blur(15px);
            color: #fcd34d; font-weight: 800; font-size: 22px; 
            text-align: center; padding: 24px; border-radius: 40px; 
            width: 100%; min-height: 100px; display: flex; align-items: center; 
            justify-content: center; border: 1px solid rgba(255,255,255,0.03); 
            box-shadow: 0 20px 40px -10px black; line-height: 1.4; 
        }
        .vid-btn { 
            background: rgba(20, 20, 30, 0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.03); color: #f0f0f4; 
            padding: 18px; font-weight: 800; flex: 1; border-radius: 40px; 
            transition: all 0.2s; font-size: 16px; 
        }
        .vid-btn:active { transform: scale(0.96); background: #2a2a3a; }

        /* Bottom nav */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(8, 8, 14, 0.8); backdrop-filter: blur(25px); 
            border-top: 1px solid rgba(255, 255, 255, 0.03); 
            display: flex; justify-content: space-around; 
            padding: 12px 0 30px 0; z-index: 1000; 
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; gap: 6px; 
            color: #6b6b80; font-weight: 700; font-size: 13px; 
            cursor: pointer; transition: all 0.2s; flex: 1; padding: 10px 0; 
        }
        .nav-item.active { color: #60a5fa; }
        .nav-icon { font-size: 26px; transition: all 0.3s; }
        .nav-item.active .nav-icon { 
            transform: translateY(-6px) scale(1.15); 
            filter: drop-shadow(0 4px 12px #3b82f6); 
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 10px; }

        /* Ek animasyonlar */
        .shake { animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="font-black text-xl tracking-tight text-white">Survival<span class="text-blue-500">Eng</span></div>
        <div class="stats-container">
            <div class="stat-pill xp"><span>⭐</span> <span id="top-xp">0</span> XP</div>
        </div>
    </div>

    <main id="view-grammar" class="view-section active">
        <div class="roadmap-container">
            <div class="level-header">
                <h1>Seviye A1</h1>
                <p>İngilizcenin Temellerini Atıyoruz</p>
            </div>
            <div id="roadmap-nodes" class="w-full flex flex-col items-center"></div>
        </div>
    </main>

    <main id="view-words" class="view-section">
        <div class="container-words" style="padding-top: 10px;">
            <div id="cardContainer" class="w-full"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('grammar', this)">
            <span class="nav-icon">🎓</span><span>Akademi</span>
        </div>
        <div class="nav-item" onclick="switchTab('words', this)">
            <span class="nav-icon">🗂️</span><span>Kelimeler</span>
        </div>
    </nav>

    <div id="grammarModal" class="grammar-modal">
        <div class="grammar-header">
            <span class="text-zinc-500 text-xl font-black cursor-pointer" onclick="closeGrammarLesson()">✕</span>
            <div class="grammar-progress-bg"><div id="grammar-progress" class="grammar-progress-fill"></div></div>
        </div>
        <div id="grammar-body" class="grammar-body"></div>
        <div class="grammar-footer">
            <button id="grammar-btn" class="main-btn btn-primary" onclick="handleGrammarAction()">DEVAM ET</button>
        </div>
    </div>

    <div class="modal" id="wordLessonModal">
        <div class="close-btn-global" onclick="closeModal('wordLessonModal')">✕</div>
        <div class="content-container !p-0" id="wordLessonContainer"></div>
    </div>
    
    <div class="modal" id="chatModal"></div>
    
    <div class="modal" id="wordQuizModal"></div>
    
    <div class="modal" id="videoModal">
        <div class="close-btn-global" onclick="closeVideo()" style="top: -20px; right: 0; position: relative; margin-left: auto; margin-bottom: 20px;">✕</div>
        <div class="video-wrapper">
            <video id="video" controls playsinline></video>
            <div class="subtitle-box" id="subtitle">Yükleniyor...</div>
            <div class="flex gap-3 mt-5 w-full">
                <button class="vid-btn" onclick="changeScene(-1)">❮ GERİ</button>
                <button class="vid-btn" onclick="changeScene(1)">İLERİ ❯</button>
            </div>
            <div class="text-center mt-4 text-xs text-zinc-500 font-bold uppercase tracking-widest bg-zinc-900/50 px-4 py-2 rounded-full border border-zinc-800" id="status">...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const db = {
            load: () => JSON.parse(localStorage.getItem('survivalDB_v18')) || { xp: 0, solved: {}, curriculumProgress: {} },
            save: (data) => localStorage.setItem('survivalDB_v18', JSON.stringify(data)),
            init: function() { this.updateUI(this.load()); },
            addXP: function(amount, qKey) {
                let data = this.load();
                if(qKey) { if(data.solved[qKey]) return false; data.solved[qKey] = true; }
                data.xp += amount; this.save(data); this.updateUI(data); return true;
            },
            updateCurriculum: function(id, status) {
                let data = this.load(); data.curriculumProgress[id] = status; this.save(data);
            },
            getCurriculumStatus: function(id, defaultStatus) {
                let data = this.load(); return data.curriculumProgress[id] || defaultStatus;
            },
            updateUI: function(data) { let el = document.getElementById('top-xp'); if(el) el.innerText = data.xp; }
        };

        function switchTab(tabId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            el.classList.add('active');
        }

        function speak(e, txt){ if(e) e.stopPropagation(); let u = new SpeechSynthesisUtterance(txt); u.lang = "en-US"; u.rate = 0.9; speechSynthesis.speak(u); }
        
        function openModalAnim(id) { const el = document.getElementById(id); el.style.display = 'flex'; setTimeout(() => el.classList.add('show'), 10); }
        
        function closeModal(id) { 
            const el = document.getElementById(id); 
            el.classList.remove('show'); 
            setTimeout(() => {
                el.style.display = 'none';
                if(id === 'wordQuizModal') { wQuiz = null; wOptSel = null; wBuilderWords = []; wAnswered = false; }
            }, 300); 
        }

        // ==========================================
        // 3. AKADEMİ MÜFREDATI (HİKAYE BÖLÜMÜ EKLENDİ)
        // ==========================================
        const CURRICULUM = [
            {
                id: "a1_1", type: "lesson", title: "İngilizcenin Kalbi: To Be", desc: "Durum bildirmeyi ve 'olmak' fiilini öğren.", defaultStatus: "unlocked", 
                slides: [
                    { 
                        type: "theory", 
                        content: `<div class="g-theory-container">
                            <span class="g-theory-icon">🧠</span>
                            <h2 class="g-theory-title">Hareket Yoksa,<br>To Be Vardır</h2>
                            <p class="g-theory-text">Türkçede <i>"Ben bir doktorum"</i> derken cümlenin sonuna <b>-um</b> ekleriz. İngilizcede ise kelimelerin önüne <span class="g-highlight">To Be (Am/Is/Are)</span> koyarak bu bağı kurarız.</p>
                            <div class="g-alert-box"><strong>💡 Altın Kural</strong>Eğer cümlede eylem (koşmak, gitmek) yoksa, mutlaka Am, Is veya Are kullanmalısın!</div>
                        </div>` 
                    },
                    { 
                        type: "theory", 
                        content: `<div class="g-theory-container">
                            <span class="g-theory-icon">🧩</span>
                            <h2 class="g-theory-title">Görsel Formül</h2>
                            <p class="g-theory-text">Kişiye göre To Be fiili 3 farklı kılığa girer:</p>
                            <div class="g-formula">
                                <div class="g-formula-row"><span class="g-pill subj">I (Ben)</span> <span>+</span> <span class="g-pill verb">am</span></div>
                                <div class="g-formula-row"><span class="g-pill subj">He / She / It</span> <span>+</span> <span class="g-pill verb">is</span></div>
                                <div class="g-formula-row"><span class="g-pill subj">We / You / They</span> <span>+</span> <span class="g-pill verb">are</span></div>
                            </div>
                        </div>` 
                    },
                    {
                        type: "quiz_match",
                        q: "Kelimeleri doğru kutuya gönder:",
                        targets: ["I", "He / She / It", "We / You / They"],
                        items: ["are", "am", "is"], 
                        answers: {"I": "am", "He / She / It": "is", "We / You / They": "are"}
                    },
                    { 
                        type: "theory", 
                        content: `<div class="g-theory-container">
                            <span class="g-theory-icon">🎧</span>
                            <h2 class="g-theory-title">Dinle ve Hisset</h2>
                            <p class="g-theory-text">Kelimelerin nasıl bağlandığını görmek için örneklere dokun.</p>
                            <div class="g-example-card" onclick="speak(event, 'I am a doctor')">
                                <div class="g-play-btn">🔊</div>
                                <div><div class="g-ex-en">I <span class="g-highlight">am</span> a doctor.</div><div class="g-ex-tr">Ben bir doktorum.</div></div>
                            </div>
                            <div class="g-example-card" onclick="speak(event, 'She is happy')">
                                <div class="g-play-btn">🔊</div>
                                <div><div class="g-ex-en">She <span class="g-highlight">is</span> happy.</div><div class="g-ex-tr">O (kadın) mutludur.</div></div>
                            </div>
                            <div class="g-example-card" onclick="speak(event, 'They are ready')">
                                <div class="g-play-btn">🔊</div>
                                <div><div class="g-ex-en">They <span class="g-highlight">are</span> ready.</div><div class="g-ex-tr">Onlar hazırlar.</div></div>
                            </div>
                        </div>` 
                    },
                    {
                        type: "quiz_swipe",
                        title: "Refleks Testi:<br>Doğru mu Yanlış mı?",
                        cards: [
                            { text: "I am hungry.", isCorrect: true, exp: "I her zaman am alır." },
                            { text: "He are happy.", isCorrect: false, exp: "He tekildir, 'is' almalıdır." },
                            { text: "They is ready.", isCorrect: false, exp: "They çoğuldur, 'are' almalıdır." },
                            { text: "We are late.", isCorrect: true, exp: "We çoğuldur, are alır." }
                        ]
                    },
                    { type: "quiz_builder", q: "Olumsuz yapmak için am/is/are kelimesinden sonra 'not' ekle:", tr_hint: "Biz yorgun değiliz.", words: ["tired", "aren't", "We"], correct_order: ["We", "aren't", "tired"] },
                    { type: "theory", content: `<div class="g-theory-container"><span class="g-theory-icon">🏆</span><h2 class="g-theory-title text-emerald-400">Harika İş!</h2><p class="g-theory-text">İngilizcenin en temel kuralı olan 'To Be' mantığını çözdün. Artık eylem barındırmayan cümleleri rahatça kurabilirsin.</p></div>` }
                ]
            },
            {
                id: "a1_2", type: "lesson", title: "İşaret Etmek: This & That", desc: "Yakındaki ve uzaktaki nesneleri göstermeyi öğren.", defaultStatus: "locked",
                slides: [
                    { type: "theory", content: `<div class="g-theory-container"><span class="g-theory-icon">👉</span><h2 class="g-theory-title">Bu ve Şu Mantığı</h2><p class="g-theory-text">Eğer nesne <b>tek bir taneyse</b> ve elimizi uzattığımızda değecek kadar <b>yakındaysa</b> <span class='g-highlight'>This (Bu)</span> deriz. Eğer <b>uzaktaysa</b> <span class='g-highlight'>That (Şu/O)</span> deriz.</p></div>` },
                    { type: "quiz_mc", q: "Gökyüzündeki bir uçağı gösterirken cümleye nasıl başlarsın?", options: ["This is a plane.", "That is a plane.", "Are a plane."], answer: 1 },
                    { type: "quiz_builder", q: "Çoğul kuralına göre cümleyi oluştur:", tr_hint: "Şunlar (uzaktakiler) benim arabalarım.", words: ["my", "are", "cars", "Those"], correct_order: ["Those", "are", "my", "cars"] },
                ]
            },
            {
                id: "a1_story_1", type: "story", title: "Bölüm Sonu: Havalimanı", desc: "Öğrendiklerini gerçek bir senaryoda test et.", defaultStatus: "locked",
                slides: [
                    {
                        type: "story_scene",
                        img_icon: "✈️",
                        text: "Londra Heathrow havalimanına yeni indin. Pasaport kontrolünden geçtin ve valizini arıyorsun. Karşına bir güvenlik görevlisi çıktı. Sana doğru bakıyor.",
                        options: [
                            { text: "I am tourist.", isCorrect: true, feedback: "Güzel! Kendini doğru tanıttın." },
                            { text: "I is tourist.", isCorrect: false, feedback: "Hata! I her zaman 'am' alır. Güvenlik sana şaşkınca bakıyor." }
                        ]
                    },
                    {
                        type: "story_scene",
                        img_icon: "🧳",
                        text: "Güvenlik gülümsedi. Şimdi ona uzağındaki kırmızı valizi gösterip senin olduğunu söylemen gerekiyor.",
                        options: [
                            { text: "This is my bag.", isCorrect: false, feedback: "Hata! Valiz uzakta olduğu için 'This' diyemezsin." },
                            { text: "That is my bag.", isCorrect: true, feedback: "Harika! Uzaktaki nesneler için That kullanılır." }
                        ]
                    },
                    {
                        type: "theory", 
                        content: `<div class="g-theory-container"><span class="g-theory-icon">🏆</span><h2 class="g-theory-title text-emerald-400">Hayatta Kaldın!</h2><p class="g-theory-text">Valizini başarıyla aldın ve Londra sokaklarına çıkmaya hazırsın. 'To Be' ve 'This/That' kurallarını sokakta kullanabileceğini kanıtladın.</p></div>`
                    }
                ]
            },
            { id: "a1_3", type: "lesson", title: "Benim, Senin, Onun", desc: "Sahiplik sıfatları ve cinsiyet tuzağı.", defaultStatus: "locked", slides: [] },
            { id: "a1_4", type: "lesson", title: "Geniş Zaman (Simple Present)", desc: "Günlük rutinler ve alışkanlıklar.", defaultStatus: "locked", slides: [] },
        ];

        let activeGrammarLesson = null, currentGrammarSlide = 0, grammarState = 'reading';
        let grammarSelectedOpt = null, grammarBuilderWords = [];
        let swipeCurrentIdx = 0, swipeMistakes = 0;
        let matchState = { bank: [], slots: {}, selectedBankId: null };

        function renderRoadmap() {
            const container = document.getElementById("roadmap-nodes");
            container.innerHTML = "";
            CURRICULUM.forEach((node) => {
                let status = db.getCurriculumStatus(node.id, node.defaultStatus);
                let isStory = node.type === "story";
                let btnClass = isStory ? "node-btn story" : "node-btn";
                let icon = isStory ? (status === "completed" ? "🎮" : "🎮") : (status === "completed" ? "⭐" : "🔒");
                
                if(!isStory && status === "unlocked") icon = "📖";
                
                if(status === "completed") btnClass += " completed";
                else if(status === "unlocked") btnClass += " unlocked";

                container.innerHTML += `<div class="node-wrapper"><div class="${btnClass}" onclick="openGrammarLesson('${node.id}')">${icon}</div><div class="node-info"><h3>${node.title}</h3><p>${node.desc}</p></div><div class="node-line"></div></div>`;
            });
        }

        function openGrammarLesson(id) {
            let status = db.getCurriculumStatus(id, CURRICULUM.find(l=>l.id===id).defaultStatus);
            if(status === "locked") return alert("Bu kilidi açmak için önceki dersleri tamamlamalısın!");
            activeGrammarLesson = CURRICULUM.find(l => l.id === id);
            if(!activeGrammarLesson.slides || activeGrammarLesson.slides.length === 0) { alert("Bu dersin içerikleri yakında eklenecek!"); return; }
            
            currentGrammarSlide = 0; 
            document.getElementById("grammarModal").classList.add("show"); 
            renderGrammarSlide();
        }

        function closeGrammarLesson() {
            document.getElementById("grammarModal").classList.remove("show");
            activeGrammarLesson = null; grammarSelectedOpt = null; grammarBuilderWords = []; grammarState = 'reading';
        }

        function renderGrammarSlide() {
            const slide = activeGrammarLesson.slides[currentGrammarSlide];
            const body = document.getElementById("grammar-body");
            const prog = ((currentGrammarSlide) / activeGrammarLesson.slides.length) * 100;
            document.getElementById("grammar-progress").style.width = prog + "%";

            grammarSelectedOpt = null; grammarBuilderWords = [];
            
            document.querySelector('.grammar-footer').style.display = 'flex'; 
            grammarState = slide.type === "theory" ? 'reading' : 'answering';

            if(slide.type === "theory") {
                body.innerHTML = slide.content;
                setupGrammarBtn(currentGrammarSlide === activeGrammarLesson.slides.length - 1 ? "BİTİR" : "DEVAM ET", "btn-primary", false);
            } 
            else if (slide.type === "quiz_mc") {
                let html = `<h2 class="text-3xl font-black text-white mb-8 leading-tight" style="animation: fadeIn 0.3s ease;">${slide.q}</h2><div class="flex flex-col gap-4">`;
                slide.options.forEach((opt, i) => { html += `<div class="quiz-opt" id="g-opt-${i}" onclick="selectGrammarOpt(${i})" style="animation: fadeIn 0.4s ease; animation-delay: ${i*0.1}s; animation-fill-mode: both;"><span>${opt}</span><div class="opt-radio"></div></div>`; });
                body.innerHTML = html + "</div>"; setupGrammarBtn("KONTROL ET", "btn-disabled", true);
            }
            else if (slide.type === "quiz_builder") {
                let html = `<h2 class="text-3xl font-black text-white mb-4 leading-tight" style="animation: fadeIn 0.3s ease;">${slide.q}</h2><div class="text-zinc-300 font-bold mb-8 text-lg border-l-4 border-blue-500 pl-5 bg-blue-500/10 py-4 rounded-r-2xl" style="animation: fadeIn 0.4s ease;">${slide.tr_hint}</div><div class="sentence-box" id="g-s-box" style="animation: fadeIn 0.5s ease;"></div><div class="word-bank">`;
                slide.words.forEach((w, i) => { 
                    let safeW = w.replace(/'/g, "\\'"); 
                    html += `<div class="word-tile" id="g-wb-${i}" onclick="selectGrammarWord('${safeW}', ${i})" style="animation: fadeIn 0.5s ease; animation-delay: ${i*0.05}s; animation-fill-mode: both;">${w}</div>`; 
                });
                body.innerHTML = html + "</div>"; setupGrammarBtn("KONTROL ET", "btn-disabled", true);
            }
            else if (slide.type === "quiz_swipe") {
                grammarState = "swiping"; swipeCurrentIdx = 0; swipeMistakes = 0;
                let html = `<h2 class="text-3xl font-black text-white mb-6 text-center leading-tight">${slide.title}</h2>
                <div class="relative w-full h-[300px] mb-8 mt-4" id="swipe-deck">`;
                
                for(let i=slide.cards.length-1; i>=0; i--) {
                    let c = slide.cards[i];
                    html += `<div class="absolute inset-0 bg-gradient-to-br from-[#20202a] to-[#101018] border-2 border-[#3a3a45] rounded-[40px] p-8 flex items-center justify-center text-center shadow-2xl transition-all duration-300 ease-out" id="s-card-${i}" style="z-index: ${slide.cards.length - i};">
                        <span class="text-3xl font-black text-white">${c.text}</span>
                    </div>`;
                }
                html += `</div>
                <div class="flex justify-between gap-4 w-full">
                    <button onclick="handleSwipe(false)" class="flex-1 bg-red-500/10 border-2 border-red-500 text-red-500 font-black text-lg py-6 rounded-[40px] active:scale-95 transition-transform flex flex-col items-center gap-2"><span class="text-4xl">❌</span> YANLIŞ</button>
                    <button onclick="handleSwipe(true)" class="flex-1 bg-emerald-500/10 border-2 border-emerald-500 text-emerald-500 font-black text-lg py-6 rounded-[40px] active:scale-95 transition-transform flex flex-col items-center gap-2"><span class="text-4xl">✅</span> DOĞRU</button>
                </div>
                <div id="swipe-feedback" class="mt-8 flex flex-col gap-3"></div>`;
                
                body.innerHTML = html;
                setupGrammarBtn("KONTROL ET", "btn-disabled", true);
            }
            else if (slide.type === "quiz_match") {
                matchState = {
                    bank: slide.items.map((w, i) => ({id: i, word: w})),
                    slots: {},
                    selectedBankId: null
                };
                slide.targets.forEach(t => matchState.slots[t] = null);
                
                body.innerHTML = `<h2 class="text-3xl font-black text-white mb-6 text-center leading-tight">${slide.q}</h2><div id="g-match-box" class="w-full"></div>`;
                renderMatchGame();
            }
            else if (slide.type === "story_scene") {
                grammarState = 'story_waiting';
                document.querySelector('.grammar-footer').style.display = 'none';
                
                let html = `
                    <div class="story-container">
                        <div class="story-scene-img">${slide.img_icon}</div>
                        <div class="story-text">${slide.text}</div>
                        <div class="story-options">
                `;
                
                slide.options.forEach((opt, i) => {
                    let safeFeedback = opt.feedback.replace(/'/g, "\\'");
                    html += `<button class="story-opt-btn" onclick="handleStoryChoice(${opt.isCorrect}, '${safeFeedback}')">${opt.text}</button>`;
                });
                
                html += `</div></div>`;
                body.innerHTML = html;
            }
        }

        function handleStoryChoice(isCorrect, feedback) {
            if(grammarState !== 'story_waiting') return;
            
            const body = document.getElementById("grammar-body");
            document.querySelector('.grammar-footer').style.display = 'flex'; 
            
            if(isCorrect) {
                grammarState = 'checked';
                body.innerHTML += `<div class="mt-6 p-5 bg-emerald-500/10 border border-emerald-500/30 rounded-3xl"><span class="text-emerald-400 font-black text-xl block mb-2">Doğru Hamle!</span><span class="text-emerald-100">${feedback}</span></div>`;
                setupGrammarBtn("HİKAYEYE DEVAM ET ❯", "btn-success", false);
            } else {
                grammarState = 'story_failed';
                body.innerHTML += `<div class="mt-6 p-5 bg-red-500/10 border border-red-500/30 rounded-3xl"><span class="text-red-400 font-black text-xl block mb-2">Yanlış Hamle!</span><span class="text-red-100">${feedback}</span></div>`;
                setupGrammarBtn("TEKRAR DENE", "btn-primary", false);
                document.querySelector('.grammar-body').classList.add('shake'); 
                setTimeout(()=>document.querySelector('.grammar-body').classList.remove('shake'), 500);
            }
        }

        function handleSwipe(userSaysCorrect) {
            let slide = activeGrammarLesson.slides[currentGrammarSlide];
            if(swipeCurrentIdx >= slide.cards.length) return;
            
            let cardData = slide.cards[swipeCurrentIdx];
            let cardEl = document.getElementById(`s-card-${swipeCurrentIdx}`);
            let isActuallyCorrect = cardData.isCorrect;
            let userGotItRight = (userSaysCorrect === isActuallyCorrect);

            cardEl.classList.add(userSaysCorrect ? 'swipe-card-out-right' : 'swipe-card-out-left');

            if(!userGotItRight) {
                swipeMistakes++;
                document.getElementById("swipe-feedback").innerHTML += `<div class="bg-red-500/10 border border-red-500/20 p-5 rounded-2xl"><span class="text-red-400 font-bold block mb-2">❌ Hatalı Karar: "${cardData.text}"</span><span class="text-zinc-300 text-sm">${cardData.exp}</span></div>`;
            }

            swipeCurrentIdx++;
            if(swipeCurrentIdx >= slide.cards.length) {
                if(swipeMistakes === 0) {
                    document.getElementById("swipe-feedback").innerHTML = `<div class="bg-emerald-500/10 border border-emerald-500/20 p-5 rounded-2xl text-center"><span class="text-emerald-400 font-black text-3xl block">🎉 Kusursuz!</span><span class="text-emerald-200/80 text-sm font-medium">Bütün reflekslerin doğruydu.</span></div>`;
                }
                setupGrammarBtn("DEVAM ET", "btn-primary", false);
                grammarState = 'swipe_done'; 
            }
        }

        function renderMatchGame() {
            const slide = activeGrammarLesson.slides[currentGrammarSlide];
            let box = document.getElementById("g-match-box");
            if(!box) return;
            let html = `<div class="flex flex-col gap-4 w-full mb-10">`;
            
            slide.targets.forEach(t => {
                let itemInSlot = matchState.slots[t];
                let slotClass = itemInSlot ? "bg-blue-600 border-blue-500 text-white border-solid shadow-[0_8px_25px_rgba(37,99,235,0.5)]" : "bg-black border-zinc-700 border-dashed text-zinc-600";
                
                if(grammarState === 'checked') { 
                    let isCorrect = itemInSlot && itemInSlot.word === slide.answers[t];
                    slotClass = isCorrect ? "bg-emerald-500 border-emerald-400 text-white border-solid" : "bg-red-500 border-red-400 text-white border-solid";
                }

                html += `<div class="flex items-center gap-4 bg-[#15151f] border border-[#2a2a35] p-4 rounded-3xl">
                    <div class="text-zinc-300 font-black text-lg w-[45%] text-right">${t}</div>
                    <div class="text-zinc-500 font-black text-xl w-[5%] text-center">+</div>
                    <div class="match-slot flex-1 h-[64px] ${slotClass} border-2 rounded-2xl flex items-center justify-center font-black text-xl cursor-pointer transition-all" onclick="handleMatchSlotClick('${t}')">
                        ${itemInSlot ? itemInSlot.word : ''}
                    </div>
                </div>`;
            });
            html += `</div><div class="flex flex-wrap gap-4 justify-center min-h-[70px]">`;
            
            matchState.bank.forEach(item => {
                if(item) {
                    let isSelected = matchState.selectedBankId === item.id;
                    let btnClass = isSelected ? "bg-blue-500 text-white border-blue-700 scale-110 shadow-[0_0_30px_rgba(59,130,246,0.7)]" : "bg-[#20202a] border-[#3a3a45] text-white";
                    html += `<div class="match-item ${btnClass} border-b-4 border-2 font-black text-xl px-8 py-5 rounded-2xl cursor-pointer transition-all active:scale-95" onclick="handleMatchBankClick(${item.id})">${item.word}</div>`;
                }
            });
            
            box.innerHTML = html + `</div>`;
            
            if(grammarState !== 'checked') {
                let allFilled = Object.values(matchState.slots).every(v => v !== null);
                setupGrammarBtn("KONTROL ET", allFilled ? "btn-primary" : "btn-disabled", !allFilled);
            }
        }

        function handleMatchBankClick(id) {
            if(grammarState === 'checked') return;
            matchState.selectedBankId = (matchState.selectedBankId === id) ? null : id;
            renderMatchGame();
        }

        function handleMatchSlotClick(target) {
            if(grammarState === 'checked') return;
            let currentItemInSlot = matchState.slots[target];

            if(matchState.selectedBankId !== null) {
                let itemToMove = matchState.bank.find(i => i && i.id === matchState.selectedBankId);
                if(currentItemInSlot) matchState.bank[currentItemInSlot.id] = currentItemInSlot;
                matchState.slots[target] = itemToMove;
                matchState.bank[matchState.selectedBankId] = null; 
                matchState.selectedBankId = null; 
            } else {
                if(currentItemInSlot) {
                    matchState.bank[currentItemInSlot.id] = currentItemInSlot;
                    matchState.slots[target] = null;
                }
            }
            renderMatchGame();
        }

        function setupGrammarBtn(text, className, disabled) { const btn = document.getElementById("grammar-btn"); btn.innerHTML = text; btn.className = `main-btn ${className}`; btn.disabled = disabled; }
        function selectGrammarOpt(i) { if(grammarState !== 'answering') return; grammarSelectedOpt = i; document.querySelectorAll('[id^="g-opt-"]').forEach(el => el.classList.remove('selected')); document.getElementById(`g-opt-${i}`).classList.add('selected'); setupGrammarBtn("KONTROL ET", "btn-primary", false); }
        function selectGrammarWord(word, id) { if(grammarState !== 'answering') return; grammarBuilderWords.push({word, id}); document.getElementById(`g-wb-${id}`).classList.add('hidden'); updateGrammarBuilder(); }
        function removeGrammarWord(id) { if(grammarState !== 'answering') return; const indexToRemove = grammarBuilderWords.findIndex(item => item.id === id); if (indexToRemove > -1) { grammarBuilderWords.splice(indexToRemove, 1); document.getElementById(`g-wb-${id}`).classList.remove('hidden'); updateGrammarBuilder(); } }
        function updateGrammarBuilder() { const box = document.getElementById("g-s-box"); box.innerHTML = grammarBuilderWords.map(item => `<div class="word-tile" onclick="removeGrammarWord(${item.id})">${item.word}</div>`).join(''); if(grammarBuilderWords.length > 0) box.classList.add("filled"); else box.classList.remove("filled"); const slide = activeGrammarLesson.slides[currentGrammarSlide]; if(grammarBuilderWords.length === slide.words.length) setupGrammarBtn("KONTROL ET", "btn-primary", false); else setupGrammarBtn("KONTROL ET", "btn-disabled", true); }

        function handleGrammarAction() {
            const slide = activeGrammarLesson.slides[currentGrammarSlide];
            
            if(grammarState === 'story_failed') {
                renderGrammarSlide();
                return;
            }

            if(grammarState === 'swipe_done') {
                currentGrammarSlide++; 
                if(currentGrammarSlide >= activeGrammarLesson.slides.length) { finishGrammarLesson(); return; } 
                renderGrammarSlide();
                return;
            }

            if(grammarState === 'reading') { currentGrammarSlide++; if(currentGrammarSlide >= activeGrammarLesson.slides.length) { finishGrammarLesson(); return; } renderGrammarSlide(); } 
            else if (grammarState === 'answering') {
                let isCorrect = false; let errorHtml = '';
                
                if(slide.type === "quiz_mc") { 
                    isCorrect = (grammarSelectedOpt === slide.answer); 
                    document.getElementById(`g-opt-${grammarSelectedOpt}`).classList.add(isCorrect ? 'correct' : 'wrong'); 
                    if(!isCorrect) {
                        document.getElementById(`g-opt-${slide.answer}`).classList.add('correct'); 
                        if(slide.explanation) errorHtml = `<div class="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl"><span class="text-xs uppercase text-amber-400 font-black block mb-1">💡 Hoca Notu:</span><span class="text-red-200 text-sm font-medium">${slide.explanation}</span></div>`;
                    }
                } 
                else if (slide.type === "quiz_builder") { 
                    const userStr = grammarBuilderWords.map(w => w.word).join(" "); const correctStr = slide.correct_order.join(" "); isCorrect = (userStr === correctStr); 
                    let box = document.getElementById("g-s-box"); 
                    if(!isCorrect) { 
                        box.style.borderColor = "#ef4444"; box.style.background = "rgba(239,68,68,0.1)"; 
                        document.querySelector('.grammar-body').classList.add('shake'); setTimeout(()=>document.querySelector('.grammar-body').classList.remove('shake'), 500);
                        errorHtml = `<div class="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl"><span class="text-xs uppercase text-red-400 font-black block mb-1">Doğru Çeviri:</span><span class="text-white text-lg">${correctStr}</span></div>`;
                    } else { box.style.borderColor = "#10b981"; box.style.background = "rgba(16,185,129,0.1)"; } 
                }
                else if (slide.type === "quiz_match") {
                    isCorrect = true;
                    Object.keys(slide.answers).forEach(t => {
                        if(!matchState.slots[t] || matchState.slots[t].word !== slide.answers[t]) isCorrect = false;
                    });
                    
                    grammarState = 'checked';
                    renderMatchGame();

                    if(!isCorrect) {
                        document.querySelector('.grammar-body').classList.add('shake'); setTimeout(()=>document.querySelector('.grammar-body').classList.remove('shake'), 500);
                    }
                }
                
                if(errorHtml) document.getElementById("grammar-body").innerHTML += errorHtml;
                if(isCorrect) db.addXP(5); 
                grammarState = 'checked'; 
                setupGrammarBtn(isCorrect ? "HARİKA! DEVAM ET ❯" : "ANLADIM, DEVAM ET ❯", isCorrect ? "btn-success" : "btn-primary", false);
            }
            else if (grammarState === 'checked') { currentGrammarSlide++; if(currentGrammarSlide >= activeGrammarLesson.slides.length) { finishGrammarLesson(); } else { renderGrammarSlide(); } }
        }

        function finishGrammarLesson() { db.updateCurriculum(activeGrammarLesson.id, "completed"); let nextLesson = CURRICULUM[CURRICULUM.findIndex(l=>l.id===activeGrammarLesson.id)+1]; if(nextLesson) db.updateCurriculum(nextLesson.id, "unlocked"); renderRoadmap(); closeGrammarLesson(); }

        // ==========================================
        // YENİ KELİMELER JSON BAĞLANTISI (DEĞİŞEN TEK KISIM BURASI)
        // ==========================================
        let CARDS = [];

        async function loadWordsData() {
            try {
                // Linki buraya entegre ettim
                const response = await fetch('https://raw.githubusercontent.com/theven900-blip/sadsadsadsad/refs/heads/main/words.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                CARDS = await response.json();
                renderCards();
            } catch (error) {
                console.error("Kelime verileri çekilirken hata oluştu:", error);
                document.getElementById("cardContainer").innerHTML = `
                    <div class="bg-red-500/10 border border-red-500/30 p-6 rounded-3xl text-center mt-10">
                        <span class="text-3xl mb-2 block">⚠️</span>
                        <h3 class="text-red-400 font-bold text-lg mb-2">Veri Bağlantı Hatası</h3>
                        <p class="text-zinc-400 text-sm">words.json dosyası okunamadı. VS Code üzerinden "Live Server" ile başlattığından emin ol.</p>
                    </div>`;
            }
        }

        let wQuiz=null, wQIdx=0, wScore=0, wOptSel=null, wAnswered=false, wBuilderWords=[], currentCardIndex=0;

        // KELİMELER KARTLARINI ÇİZEN FONKSİYON
        function renderCards() {
            const container = document.getElementById("cardContainer");
            container.innerHTML = "";
            CARDS.forEach((wordData, i) => {
                const div = document.createElement("div"); div.className = "card-box";
                div.innerHTML = `
                <div class="card-inner">
                    <div class="face front"><div class="front-glow"></div><div class="word-title">${wordData.en}</div><div class="phonetic-badge">/ ${wordData.phonetic_tr} /</div><div class="tap-hint"><span>↻</span> Dokun ve Çevir</div></div>
                    <div class="face back">
                        <div class="w-full text-center mt-2">
                            <h2 class="text-[42px] font-black text-[#2ed573] uppercase tracking-tight mb-4 drop-shadow-md">${wordData.tr}</h2>
                            <div class="bg-[#15151f] rounded-3xl p-6 border border-white/5 flex flex-col items-center gap-3 mb-6 shadow-inner">
                                <p class="text-white text-[22px] font-bold">"${wordData.example_en}"</p>
                                <p class="text-zinc-400 text-[16px] italic mb-3">${wordData.example_tr}</p>
                                <div class="bg-[#fbc531]/10 text-[#fbc531] border border-[#fbc531]/20 font-mono font-bold text-xs px-5 py-2 rounded-full mt-1">/ ${wordData.example_phonetic_tr} /</div>
                            </div>
                        </div>
                        <div class="w-full mt-auto">
                            <div class="grid grid-cols-2 gap-3 mb-4">
                                <div class="bg-[#15151f] border border-[#2ed573]/20 rounded-3xl py-5 flex flex-col items-center justify-center gap-2 cursor-pointer transition-transform active:scale-95" onclick="openWordLesson(event, ${i})"><span class="text-3xl drop-shadow-md">📚</span><span class="text-[#2ed573] font-bold text-[14px]">Ders Notu</span></div>
                                <div class="bg-[#15151f] border border-[#ffa502]/20 rounded-3xl py-5 flex flex-col items-center justify-center gap-2 cursor-pointer transition-transform active:scale-95" onclick="openChat(event, ${i})"><span class="text-3xl drop-shadow-md">💬</span><span class="text-[#ffa502] font-bold text-[14px]">Diyalog</span></div>
                                <div class="bg-[#15151f] border border-[#9c88ff]/20 rounded-3xl py-5 flex flex-col items-center justify-center gap-2 cursor-pointer transition-transform active:scale-95" onclick="speak(event, '${wordData.en}')"><span class="text-3xl drop-shadow-md">🗣️</span><span class="text-[#9c88ff] font-bold text-[14px]">Telaffuz</span></div>
                                <div class="bg-[#15151f] border border-[#70a1ff]/20 rounded-3xl py-5 flex flex-col items-center justify-center gap-2 cursor-pointer transition-transform active:scale-95" onclick="openVideo(event, ${i})"><span class="text-3xl drop-shadow-md">🎬</span><span class="text-[#70a1ff] font-bold text-[14px]">Sahneler</span></div>
                            </div>
                            <button class="w-full bg-[#3742fa] hover:bg-[#5352ed] text-white font-black text-[18px] py-5 rounded-[40px] flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-[0_0_30px_rgba(55,66,250,0.4)]" onclick="startWordQuiz(event, ${i})">🎯 EGZERSİZ YAP <span class="text-white/80 text-[14px] ml-1">+XP</span></button>
                        </div>
                    </div>
                </div>`;
                div.addEventListener("click", (e) => { if(!e.target.closest('.grid > div') && !e.target.closest('button')) div.classList.toggle("is-flipped"); });
                container.appendChild(div);
            });
        }

        // KELİME DERS NOTU FONKSİYONU
        function openWordLesson(e, i) { e.stopPropagation(); const l = CARDS[i].lesson; let examplesHtml = l.examples.map(ex => `<div class="relative bg-[#15151f] border border-[#2a2a35] p-6 rounded-3xl mb-5 hover:bg-[#1f1f2a] transition-colors"><div class="absolute -top-3 left-4 bg-emerald-500/20 backdrop-blur-md text-emerald-400 text-[11px] font-black px-4 py-1.5 rounded-full border border-emerald-500/30 uppercase tracking-widest shadow-lg">${ex.level}</div><div class="text-white font-bold text-xl mt-3 mb-2">${ex.en}</div><div class="text-zinc-400 text-base mb-4">${ex.tr}</div><div class="inline-flex items-center gap-2 bg-amber-500/10 border border-amber-500/20 px-4 py-2 rounded-full text-amber-400 font-mono text-xs font-bold"><span>🗣️</span> / ${ex.ph} /</div></div>`).join(''); document.getElementById("wordLessonContainer").innerHTML = `<div class="bg-gradient-to-b from-blue-900/30 to-transparent p-8 pb-10 border-b border-[#2a2a35]/50 text-center relative overflow-hidden rounded-t-[48px]"><div class="absolute top-0 left-1/2 -translate-x-1/2 bg-blue-500/20 w-48 h-48 rounded-full blur-[80px] z-0"></div><h2 class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white to-zinc-400 capitalize relative z-10 mb-4 tracking-tight">${l.title}</h2><div class="inline-block bg-black/50 backdrop-blur-md border border-white/10 px-6 py-3 rounded-full text-zinc-300 font-medium text-base relative z-10 shadow-xl leading-relaxed max-w-[90%]">${l.meaning}</div></div><div class="p-6 space-y-6"><div class="bg-gradient-to-br from-sky-900/20 to-transparent border border-sky-500/20 p-6 rounded-3xl shadow-lg relative overflow-hidden group"><div class="absolute -right-4 -top-4 text-8xl opacity-5 group-hover:scale-110 transition-transform duration-500 blur-sm">🧠</div><h3 class="text-sky-400 font-black uppercase text-xs tracking-[3px] mb-4 flex items-center gap-2"><span class="text-xl">📌</span> HAFIZA ÇİVİSİ</h3><p class="text-sky-100/90 text-[16px] leading-relaxed relative z-10">${l.memory_hook}</p></div><div class="bg-[#15151f] border border-[#2a2a35] rounded-3xl p-6 shadow-lg"><h3 class="text-zinc-400 font-black uppercase text-xs tracking-[3px] mb-4 flex items-center gap-2"><span class="text-xl">👨‍🏫</span> HOCA NOTU</h3><p class="text-zinc-300 text-[16px] leading-relaxed">${l.deep_dive}</p><div class="mt-5 bg-amber-500/10 border border-amber-500/20 p-5 rounded-2xl flex gap-3 items-start"><span class="text-amber-500 text-2xl drop-shadow-md">💡</span><p class="text-amber-200/90 text-sm leading-relaxed mt-1 font-medium">${l.grammar_tip}</p></div></div><div class="bg-gradient-to-r from-red-950/30 to-transparent border-l-4 border-red-500 p-6 rounded-r-3xl rounded-l-md"><h3 class="text-red-400 font-black uppercase text-xs tracking-[3px] mb-3 flex items-center gap-2"><span class="text-xl">⚠️</span> SIK YAPILAN HATA</h3><p class="text-red-200/90 text-[16px] leading-relaxed">${l.common_mistakes}</p></div><div class="pt-6 pb-4"><h3 class="text-zinc-500 font-black uppercase text-xs tracking-[3px] mb-6 flex items-center justify-center gap-2"><span class="text-xl">🎯</span> ÖRNEK KULLANIMLAR</h3>${examplesHtml}</div></div>`; openModalAnim('wordLessonModal'); }

        // KELİME CANLI DİYALOG FONKSİYONU
        function openChat(e, i) { e.stopPropagation(); const msgs = CARDS[i].conversation; let html = `<div class="chat-container-modern" onclick="event.stopPropagation()"><div class="chat-header"><div><h2 class="text-2xl font-black text-white leading-tight tracking-tight">Canlı Diyalog</h2><p class="text-[11px] text-emerald-400 font-bold uppercase tracking-[2px] mt-1">GÜNLÜK KULLANIM</p></div><div class="close-btn-global !relative !top-0 !right-0 !w-12 !h-12" onclick="closeModal('chatModal')">✕</div></div><div class="chat-messages">`; msgs.forEach((m, idx) => { let isA = m.sender === "A"; html += `<div class="msg-row ${isA ? "left" : "right"}" style="animation: slideInUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; animation-delay: ${idx * 0.15}s; opacity: 0; transform: translateY(30px);"><div class="chat-avatar ${isA ? "a" : "b"}">${isA ? "👱‍♂️" : "👩‍🦰"}</div><div class="msg-bubble" onclick="speak(event, '${m.en}')"><div class="msg-en"><span>${m.en}</span><div class="msg-play-btn">🔊</div></div><div class="msg-ph">/ ${m.ph} /</div><div class="msg-tr">${m.tr}</div></div></div>`; }); document.getElementById("chatModal").innerHTML = html + `</div><div class="p-4 bg-black/80 backdrop-blur-md border-t border-[#2a2a35] text-center z-10"><p class="text-xs text-zinc-500 font-bold flex justify-center items-center gap-2 uppercase tracking-widest"><span class="text-lg">👆</span> Dinlemek için dokun</p></div></div>`; openModalAnim('chatModal'); }
        
        function startWordQuiz(e, i){ 
            e.stopPropagation(); currentCardIndex = i; wQuiz = CARDS[i].quiz; wQIdx = 0; wScore = 0; wAnswered = false; wBuilderWords = []; 
            openModalAnim('wordQuizModal'); renderWordQuiz(); 
        }

        function renderWordQuiz(){
            const modal = document.getElementById("wordQuizModal");
            if(wQIdx >= wQuiz.questions.length){
                modal.innerHTML = `<div class="quiz-container" style="justify-content:center; align-items:center;" onclick="event.stopPropagation()"><div class="text-center w-full px-8"><div class="text-9xl mb-8 drop-shadow-[0_0_60px_rgba(16,185,129,0.5)] animate-bounce">🏆</div><h2 class="text-7xl font-black text-emerald-400 mb-4 tracking-tighter">MÜKEMMEL!</h2><p class="text-xl text-zinc-400 font-medium mb-12">Bu turu başarıyla tamamladın.</p><div class="bg-[#15151f] border border-[#2a2a35] rounded-[48px] p-10 mb-12 flex justify-center items-center gap-6 shadow-xl"><span class="text-6xl drop-shadow-[0_0_30px_rgba(251,191,36,0.6)]">⭐</span><div class="text-left"><div class="text-zinc-500 font-black uppercase text-xs tracking-[3px] mb-1">Kazanılan XP</div><div class="text-6xl font-black text-white">+${wScore}</div></div></div><button onclick="closeModal('wordQuizModal')" class="main-btn bg-blue-600 hover:bg-blue-500 border-blue-800 shadow-[0_10px_40px_rgba(37,99,235,0.4)]" style="width:100%;">BİTİR VE DÖN</button></div></div>`;
                return;
            }

            wOptSel = null; wAnswered = false; wBuilderWords = []; 
            let q = wQuiz.questions[wQIdx]; 
            let progress = (wQIdx / wQuiz.questions.length) * 100;
            
            let html = `<div class="quiz-container" onclick="event.stopPropagation()"><div class="quiz-header"><span class="text-2xl text-zinc-500 hover:text-white cursor-pointer font-black transition-colors" onclick="closeModal('wordQuizModal')">✕</span><div class="progress-bar-bg" style="flex-grow: 1; height: 12px; background: #20202a; border-radius: 20px; margin: 0 20px; overflow: hidden; position: relative; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);"><div class="progress-bar-fill" style="height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); width: ${progress}%; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 20px;"></div></div><div class="text-emerald-400 font-black text-lg bg-emerald-500/10 px-4 py-1.5 rounded-full border border-emerald-500/20">⭐ ${wScore}</div></div><div class="quiz-body" id="wQuizBody"><h2 class="text-3xl font-black text-white mb-10 leading-tight">${q.q}</h2>`;

            if (q.type === "multiple" || q.type === "audio") {
                if (q.type === "audio") html += `<button onclick="speak(event, '${q.audio_text}')" class="w-full bg-indigo-500/10 border-2 border-indigo-500/30 text-indigo-400 py-12 rounded-[40px] mb-10 font-black text-2xl active:scale-95 transition-all flex flex-col items-center gap-4 hover:bg-indigo-500/20 shadow-lg"><span class="text-7xl drop-shadow-[0_0_30px_rgba(99,102,241,0.6)]">🔊</span> SESİ DİNLE</button>`;
                html += `<div class="flex flex-col gap-4">`; 
                q.options.forEach((opt, idx) => { html += `<div class="quiz-opt" id="w-opt-${idx}" onclick="selectWOpt(${idx})"><span>${opt}</span><div class="opt-radio"></div></div>`; }); 
                html += `</div>`;
            } 
            else if (q.type === "builder") {
                if(q.tr_hint) html += `<div class="text-zinc-300 text-xl mb-8 border-l-4 border-blue-500 pl-5 font-bold bg-blue-500/5 py-4 rounded-r-2xl">${q.tr_hint}</div>`;
                html += `<div class="sentence-box" id="wSBox"></div><div class="word-bank">`; 
                q.words.forEach((w, idx) => { 
                    let safeW = w.replace(/'/g, "\\'");
                    html += `<div class="word-tile" id="w-bank-${idx}" onclick="selectWWord('${safeW}', ${idx})">${w}</div>`; 
                }); 
                html += `</div>`;
            } 
            else if (q.type === "typing") {
                html += `<input type="text" id="wTypeIn" class="type-input" autocomplete="off" spellcheck="false" placeholder="..." oninput="checkWInput()" onkeypress="handleWEnter(event)" />`;
            }

            modal.innerHTML = html + `</div><div class="quiz-footer" id="wQuizFoot"><button id="wBtnMain" class="main-btn btn-disabled" disabled onclick="handleWQuizAction()">KONTROL ET</button></div></div>`;
            if(q.type === "typing") setTimeout(() => document.getElementById("wTypeIn").focus(), 100);
        }

        function selectWOpt(idx) { if (wAnswered) return; wOptSel = idx; document.querySelectorAll('[id^="w-opt-"]').forEach(el => el.classList.remove('selected')); document.getElementById(`w-opt-${idx}`).classList.add('selected'); enableWBtn(); }
